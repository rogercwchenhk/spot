version: '3.8'

services:
  app:
    build: .
    container_name: customer-radar
    restart: unless-stopped
    ports:
      - '${PORT:-3200}:3200'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3200
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3200/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - app-logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  app-logs:
